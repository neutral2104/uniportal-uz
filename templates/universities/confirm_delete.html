{% extends 'base.html' %}
{% block content %}
<div class="container py-5" style="max-width:500px">
  <div class="card border-0 shadow border-danger">
    <div class="card-body p-4 text-center">
      <div class="display-3 mb-3">⚠️</div>
      <h4 class="fw-bold">Delete University?</h4>
      <p class="text-muted">This will permanently delete <strong>{{ uni.name }}</strong> and all its programs.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, Delete</button>
        <a href="{% url 'uni_detail' uni.slug %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
